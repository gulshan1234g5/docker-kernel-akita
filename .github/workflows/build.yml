name: Build Docker Kernel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl clang llvm lld flex bison bc python3 libssl-dev repo

    - name: Sync kernel source
      run: |
        mkdir kernel && cd kernel
        repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
        repo sync -c --no-tags -j$(nproc)

    - name: Clone SuSFS
      run: |
        cd kernel
        git clone --depth 3 --no-tags https://gitlab.com/pershoot/susfs4ksu.git -b gki-android14-6.1-dev

    - name: Apply patches
      run: |
        cd kernel
        cp susfs4ksu/kernel_patches/fs/* common/fs/
        cp susfs4ksu/kernel_patches/include/linux/* common/include/linux/
        cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch common/
        cd common
        patch -p1 < 50_add_susfs_in_gki-android14-6.1.patch || true

    - name: Install KernelSU-Next
      run: |
        cd kernel
        curl -LSs https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh | bash -s dev-susfs

    - name: Prepare build
      run: |
        cd kernel/common
        sed -i '/"protected_exports_list"/d' BUILD.bazel
        rm -f android/abi_gki_protected_exports_* 50_add_susfs_in_gki-android14-6.1.patch
        git config user.email "builder@local"
        git config user.name "Builder"
        git add -A
        git commit -m "Docker kernel" || true

    - name: Copy Docker fragment
      run: |
        cp docker_fragment.config kernel/common/docker_fragment.config

    - name: Modify BUILD.bazel
      run: |
        cd kernel/common
        python3 << 'PYEOF'
        import re
        
        with open('BUILD.bazel', 'r') as f:
            content = f.read()
        
        # Find the kernel_aarch64 target and add post_defconfig_fragments
        # Look for the kernel_build rule
        pattern = r'(kernel_build\s*\(\s*\n\s*name\s*=\s*"kernel_aarch64",)'
        
        replacement = r'\1\n        post_defconfig_fragments = ["docker_fragment.config"],'
        
        new_content = re.sub(pattern, replacement, content, flags=re.MULTILINE)
        
        if new_content == content:
            # Try alternative pattern
            pattern2 = r'(build_config\s*=\s*"common/build\.config\.gki\.aarch64",)'
            replacement2 = r'\1\n        post_defconfig_fragments = ["docker_fragment.config"],'
            new_content = re.sub(pattern2, replacement2, content, count=1)
        
        with open('BUILD.bazel', 'w') as f:
            f.write(new_content)
        
        print("BUILD.bazel updated with Docker fragment")
        PYEOF

    - name: Build kernel
      working-directory: kernel
      run: |
        tools/bazel clean --expunge
        tools/bazel run --config=fast --config=stamp --lto=thin //common:kernel_aarch64_dist

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: docker-kernel-akita
        path: kernel/out/dist/
        retention-days: 30
