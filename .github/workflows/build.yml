name: Build Docker Kernel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl clang llvm lld flex bison bc python3 libssl-dev repo libelf-dev gcc-aarch64-linux-gnu

    - name: Sync kernel source
      run: |
        mkdir kernel && cd kernel
        repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
        repo sync -c --no-tags -j$(nproc)

    - name: Apply KernelSU-Next + SuSFS (same as WildKernel r7)
      run: |
        cd kernel
        # KernelSU-Next (not basic KernelSU)
        curl -LSs https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh | bash -s next
        
        # SuSFS patches
        git clone --depth 1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android14-6.1
        cd common
        cp ../susfs4ksu/kernel_patches/fs/* fs/
        cp ../susfs4ksu/kernel_patches/include/linux/* include/linux/
        patch -p1 -F 3 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
        patch -p1 -F 3 < ../susfs4ksu/kernel_patches/60_scope-minimized_manual_hooks.patch || true
        cd ..

    - name: Add Docker configs (only missing ones)
      run: |
        cd kernel/common
        cp ../../docker_fragment.config .
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        ./scripts/kconfig/merge_config.sh -O . .config docker_fragment.config
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- savedefconfig
        cp defconfig arch/arm64/configs/gki_defconfig
        make mrproper

    - name: Build kernel
      run: |
        cd kernel
        tools/bazel clean --expunge
        tools/bazel run --config=fast --config=stamp --lto=thin //common:kernel_aarch64_dist

    - name: Create AnyKernel3 zip
      run: |
        cd kernel
        git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git
        
        find out -name "Image" -exec cp {} AnyKernel3/Image \; 2>/dev/null || true
        ls -la AnyKernel3/Image 2>/dev/null || echo "WARNING: Image not found"
        
        cat > AnyKernel3/anykernel.sh << 'AKSH'
        properties() { '
        kernel.string=Docker Kernel for Pixel 8a (KernelSU-Next + SuSFS)
        do.devicecheck=0
        do.modules=0
        do.systemless=0
        do.cleanup=1
        device.name1=akita
        device.name2=shiba
        device.name3=husky
        '; }
        block=boot
        is_slot_device=auto
        ramdisk_compression=auto
        patch_vbmeta_flag=auto
        no_magisk_check=1
        . tools/ak3-core.sh
        split_boot
        flash_boot
        AKSH
        
        cd AnyKernel3
        zip -r9 ../Docker-Kernel-akita.zip . -x "*.git*"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: docker-kernel-akita
        path: |
          kernel/out/dist/
          kernel/Docker-Kernel-akita.zip
        retention-days: 30
