name: Build Docker Kernel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl clang llvm lld flex bison bc python3 libssl-dev repo

    - name: Sync kernel source
      run: |
        mkdir kernel && cd kernel
        repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
        repo sync -c --no-tags -j$(nproc)

    - name: Install KernelSU (NO SuSFS)
      run: |
        cd kernel
        curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -s

    - name: Add Docker configs to defconfig
      run: |
        cd kernel/common
        cat >> arch/arm64/configs/gki_defconfig << 'EOF'
        CONFIG_NAMESPACES=y
        CONFIG_PID_NS=y
        CONFIG_IPC_NS=y
        CONFIG_NET_NS=y
        CONFIG_USER_NS=y
        CONFIG_CGROUPS=y
        CONFIG_CGROUP_DEVICE=y
        CONFIG_CGROUP_PIDS=y
        CONFIG_MEMCG=y
        CONFIG_MEMCG_SWAP=y
        CONFIG_OVERLAY_FS=y
        CONFIG_VETH=y
        CONFIG_BRIDGE=y
        CONFIG_BRIDGE_NETFILTER=y
        CONFIG_IP_NF_TARGET_MASQUERADE=y
        CONFIG_SECCOMP=y
        CONFIG_POSIX_MQUEUE=y
        CONFIG_DEVTMPFS=y
        CONFIG_SYSVIPC=y
        CONFIG_ANDROID_PARANOID_NETWORK=n
        EOF

    - name: Build kernel
      run: |
        cd kernel
        tools/bazel clean --expunge
        tools/bazel run --config=fast --config=stamp --lto=thin //common:kernel_aarch64_dist

    - name: Create AnyKernel3 zip
      run: |
        cd kernel
        git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git
        
        # Find and copy Image
        find out -name "Image" -exec cp {} AnyKernel3/Image \; 2>/dev/null || true
        ls -la AnyKernel3/Image 2>/dev/null || echo "WARNING: Image not found"
        
        # Create anykernel.sh
        cat > AnyKernel3/anykernel.sh << 'AKSH'
        ### AnyKernel3 Ramdisk Mod Script
        properties() { '
        kernel.string=Docker Kernel for Pixel 8a (KernelSU)
        do.devicecheck=0
        do.modules=0
        do.systemless=0
        do.cleanup=1
        device.name1=akita
        device.name2=shiba
        device.name3=husky
        '; }
        block=boot
        is_slot_device=auto
        ramdisk_compression=auto
        patch_vbmeta_flag=auto
        no_magisk_check=1
        . tools/ak3-core.sh
        split_boot
        flash_boot
        AKSH
        
        cd AnyKernel3
        zip -r9 ../Docker-Kernel-akita.zip . -x "*.git*"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: docker-kernel-akita
        path: |
          kernel/out/dist/
          kernel/Docker-Kernel-akita.zip
        retention-days: 30
