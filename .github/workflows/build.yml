name: Build Docker Kernel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl clang llvm lld flex bison bc python3 libssl-dev repo libelf-dev gcc-aarch64-linux-gnu dwarves cpio

    - name: Sync kernel source
      run: |
        mkdir kernel && cd kernel
        repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
        repo sync -c --no-tags -j$(nproc)

    - name: Install KernelSU-Next
      run: |
        cd kernel
        git clone --depth 1 https://github.com/rifsxd/KernelSU-Next.git -b dev
        cd common
        bash ../KernelSU-Next/kernel/setup.sh
        # Fix: wrap ksu_flush_icache in do-while to suppress -Wunused-value
        sed -i 's/#define ksu_flush_icache(start, end) caches_clean_inval_pou/#define ksu_flush_icache(start, end) do { (void)caches_clean_inval_pou; } while (0)/' drivers/kernelsu/hook/arm64/patch_memory.c 2>/dev/null || true

    - name: Apply SuSFS
      run: |
        cd kernel
        git clone --depth 1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android14-6.1
        cd common
        cp -r ../susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
        cp -r ../susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true
        for p in ../susfs4ksu/kernel_patches/*.patch; do patch -p1 -F 5 < "$p" 2>/dev/null || true; done
        rm -f *.rej 2>/dev/null

    - name: Build kernel
      run: |
        cd ${{ github.workspace }}/kernel/common
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        cp ${{ github.workspace }}/docker_fragment.config .
        ./scripts/kconfig/merge_config.sh -O . .config docker_fragment.config
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
        make KCFLAGS="-Wno-unused-value" ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- Image -j$(nproc)

    - name: Create AnyKernel3 zip
      run: |
        cd ${{ github.workspace }}/kernel
        git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git --branch master
        cp common/arch/arm64/boot/Image AnyKernel3/Image 2>/dev/null || echo "Image not found"

        # Write proper anykernel.sh with GKI-compatible boot path
        cat > AnyKernel3/anykernel.sh << 'AKSH'
### AnyKernel3 Ramdisk Mod Script
## osm0sis @ xda-developers

### AnyKernel setup
properties() { '
kernel.string=Docker Kernel Pixel 8a (KSU-Next + SuSFS)
do.devicecheck=0
do.modules=0
do.systemless=0
do.cleanup=1
do.cleanuponabort=0
do.check_boot_version=0
device.name1=akita
device.name2=shiba
device.name3=husky
supported.versions=
supported.patchlevels=
supported.vendorpatchlevels=
'; }

### AnyKernel install
block=boot
is_slot_device=auto
ramdisk_compression=auto
patch_vbmeta_flag=auto
no_magisk_check=1

. tools/ak3-core.sh

split_boot

# GKI devices (Pixel 8a) have ramdisk — use unpack_ramdisk + write_boot
if [ -f "$SPLITIMG/ramdisk.cpio" ]; then
    unpack_ramdisk
    write_boot
else
    flash_boot
fi

ui_print " "
ui_print "Docker Kernel for Pixel 8a (akita)"
ui_print "KSU-Next + SuSFS included"
ui_print " "
AKSH

        cd AnyKernel3
        zip -r9 ../Docker-Kernel-akita.zip . -x "*.git*"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: docker-kernel-akita
        path: ${{ github.workspace }}/kernel/Docker-Kernel-akita.zip
        retention-days: 30
